<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Movimentação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1 th:text="${movimentacao.id == null} ? 'Nova Movimentação' : 'Editar Movimentação'">Nova Movimentação</h1>

<div th:if="${success}" class="alert alert-success" th:text="%{success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="%{error}"></div>

<form th:action="@{/movimentacoes/salvar}" th:object="${movimentacao}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
        <label>Produto</label>
        <select class="form-select" th:field="*{produto.marca}" required>
            <option value="">Selecione um produto</option>
            <option th:each="p : ${produtos}"
                    th:value="${p.marca}"
                    th:text="${p.marca} + ' (Estoque: ' + ${p.estoque} + ')'">Produto</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Data/Hora</label>
        <input type="datetime-local" class="form-control" th:field="*{dataMovimentacao}" required>
    </div>
    <div class="mb-3">
        <label>Ação</label>
        <select class="form-select" th:field="*{acao}" required>
            <option value="">Selecione</option>
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Quantidade</label>
        <input type="number" class="form-control" th:field="*{quantidade}" required min="1">
    </div>
    <div class="mb-3">
        <label>Preço de Custo</label>
        <input type="number" step="0.01" class="form-control" th:field="*{precoCusto}" required>
    </div>
    <div class="mb-3">
        <label>Preço de Venda</label>
        <input type="number" step="0.01" class="form-control" th:field="*{precoVenda}" required>
    </div>
    <div class="mb-3">
        <label>Usuário responsável (opcional)</label>
        <select class="form-select" th:field="*{usuario.id}">
            <option value="">Nenhum</option>
            <option th:each="u : ${usuarios}"
                    th:value="${u.id}"
                    th:text="${u.nome}">Usuário</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Observação</label>
        <textarea class="form-control" th:field="*{observacao}" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/movimentacoes" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
