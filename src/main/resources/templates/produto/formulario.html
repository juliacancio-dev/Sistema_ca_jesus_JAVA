<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1 th:text="${produto.id == null} ? 'Novo Produto' : 'Editar Produto'">Novo Produto</h1>

<form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
        <label>Marca</label>
        <input type="text" class="form-control" th:field="*{marca}" required>
    </div>
    <div class="mb-3">
        <label>Fornecedor</label>
        <select class="form-select" th:field="*{fornecedor.id}" required>
            <option value="">Selecione um fornecedor</option>
            <option th:each="f : ${fornecedores}"
                    th:value="${f.id}"
                    th:text="${f.nome}">Nome Fornecedor</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Preço de Custo</label>
        <input type="number" step="0.01" class="form-control" th:field="*{precoCusto}" required>
    </div>
    <div class="mb-3">
        <label>Preço de Venda</label>
        <input type="number" step="0.01" class="form-control" th:field="*{precoVenda}" required>
    </div>
    <div class="mb-3">
        <label>Estoque</label>
        <input type="number" class="form-control" th:field="*{estoque}" required>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/produtos" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
