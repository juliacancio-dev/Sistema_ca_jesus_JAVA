<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1>Produtos</h1>

    <form th:acton="@{/produtos}" method="get" class="row g-3 mb-3">
        <div class="col-auto">
            <input type="text" name="marca" class="form-control" placeholder="Buscar por marca" th:value="${param.marca}">
        </div>
        <div class="col-auto">
            <input type="text" name="fornecedor" class="form-control" placeholder="Buscar por fornecedor" th:value="${param.fornecedor}">
        </div>

        <div class="col-auto">
            <button type="submit" class="btn btn-success">Buscar</button>
            <a href="/produtos" class="btn btn-secundary">Limpar</a>
        </div>
    </form>

    <a href="/produtos/novo" class="btn btn-primary mb-3">Novo Produto</a>

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Marca</th>
                <th>Fornecedor</th>
                <th>Preço Custo</th>
                <th>Preço Venda</th>
                <th>Estoque</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="p : ${produtos}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.marca}">Marca</td>
                <td th:text="${p.fornecedor.nome}">Fornecedor</td>
                <td th:text="'R$ ' + ${#numbers.formatDecimal(p.precoCusto, 1, 2)}">0.00</td>
                <td th:text="'R$ ' + ${#numbers.formatDecimal(p.precoVenda, 1, 2)}">0.00</td>
                <td th:text="${p.estoque}">0</td>
                <td>
                    <a th:href="@{/produtos/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/produtos/deletar/{id}(id=${p.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Excluir produto?')">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
