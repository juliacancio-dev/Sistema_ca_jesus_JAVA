<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1 th:text="${usuario.id == null} ? 'Novo Usuário' : 'Editar Usuário'">Novo Usuário</h1>

<form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
    <!-- Campo oculto para ID (edição) -->
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
        <label>Nome</label>
        <input type="text" class="form-control" th:field="*{nome}" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" th:field="*{email}" required>
    </div>
    <div class="mb-3">
        <label>Senha</label>
        <input type="password" class="form-control" th:field="*{senha}" required>
    </div>
    <div class="mb-3">
        <label>CPF</label>
        <input type="text" class="form-control" th:field="*{cpf}" required>
    </div>
    <div class="mb-3">
        <label>RG</label>
        <input type="text" class="form-control" th:field="*{rg}">
    </div>
    <div class="mb-3">
        <label>Telefone</label>
        <input type="text" class="form-control" th:field="*{telefone}">
    </div>
    <div class="mb-3">
        <label>Sexo</label>
        <select class="form-select" th:field="*{sexo}">
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Outro">Outro</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Tipo de Usuário</label>
        <input type="number" class="form-control" th:field="*{tipoUsuario}" required>
    </div>
    <div class="mb-3">
        <label>CEP</label>
        <input type="text" class="form-control" th:field="*{cep}">
    </div>
    <div class="mb-3">
        <label>Endereço</label>
        <input type="text" class="form-control" th:field="*{endereco}">
    </div>
    <div class="mb-3">
        <label>Cidade</label>
        <input type="text" class="form-control" th:field="*{cidade}">
    </div>
    <div class="mb-3">
        <label>Estado</label>
        <input type="text" class="form-control" th:field="*{estado}" maxlength="2">
    </div>
    <div class="mb-3">
        <label>Ativo</label>
        <input type="checkbox" th:field="*{ativo}">
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/usuarios" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
