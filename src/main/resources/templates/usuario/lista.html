<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Usuários</h1>
<a href="/usuarios/novo" class="btn btn-primary mb-3">Novo Usuário</a>
<table class="table table-bordered table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>CPF</th>
        <th>Ativo</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${usuarios}">
        <td th:text="${u.id}">1</td>
        <td th:text="${u.nome}">Nome</td>
        <td th:text="${u.email}">email@ex.com</td>
        <td th:text="${u.cpf}">123.456.789-00</td>
        <td>
            <span th:if="${u.ativo}" class="badge bg-success">Ativo</span>
            <span th:unless="${u.ativo}" class="badge bg-danger">Inativo</span>
        </td>
        <td>
            <a th:href="@{/usuarios/editar/{id}(id=${u.id})}" class="btn btn-sm btn-warning">Editar</a>
            <a th:href="@{/usuarios/deletar/{id}(id=${u.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja excluir este usuário?')">Excluir</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
