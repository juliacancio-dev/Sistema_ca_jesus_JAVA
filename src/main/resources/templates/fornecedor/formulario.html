<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Fornecedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1 th:text="${fornecedor.id == null} ? 'Novo Fornecedor' : 'Editar Fornecedor'">Novo Fornecedor</h1>

<form th:action="@{/fornecedores/salvar}" th:object="${fornecedor}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
        <label>Nome</label>
        <input type="text" class="form-control" th:field="*{nome}" required>
    </div>
    <div class="mb-3">
        <label>CNPJ</label>
        <input type="text" class="form-control" th:field="*{cnpj}" required>
    </div>
    <div class="mb-3">
        <label>Telefone</label>
        <input type="text" class="form-control" th:field="*{telefone}" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" th:field="*{email}" required>
    </div>
    <div class="mb-3">
        <label>CEP</label>
        <input type="text" class="form-control" th:field="*{cep}">
    </div>
    <div class="mb-3">
        <label>Endereço</label>
        <input type="text" class="form-control" th:field="*{endereco}">
    </div>
    <div class="mb-3">
        <label>Número</label>
        <input type="text" class="form-control" th:field="*{numero}">
    </div>
    <div class="mb-3">
        <label>Complemento</label>
        <input type="text" class="form-control" th:field="*{complemento}">
    </div>
    <div class="mb-3">
        <label>Bairro</label>
        <input type="text" class="form-control" th:field="*{bairro}">
    </div>
    <div class="mb-3">
        <label>Cidade</label>
        <input type="text" class="form-control" th:field="*{cidade}">
    </div>
    <div class="mb-3">
        <label>Estado (UF)</label>
        <input type="text" class="form-control" th:field="*{estado}" maxlength="2">
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" th:field="*{ativo}">
        <label class="form-check-label">Ativo</label>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/fornecedores" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
